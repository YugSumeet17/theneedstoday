<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Store</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <header>
        <h1>Welcome to Your Grocery Store</h1>
        <nav>
            <ul>
                <li><a href="#products">Products</a></li>
                <li><a href="#cart">Cart</a></li>
                <li><a href="#orders">Orders</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="products">
            <h2>Product Catalog</h2>
            <div id="product-list">
                <!-- Product items will be displayed here -->
            </div>
        </section>
        <section id="cart">
            <h2>Your Shopping Cart</h2>
            <div id="cart-items">
                <!-- Cart items will be displayed here -->
            </div>
            <button id="checkout">Checkout</button>
        </section>
        <section id="orders">
            <h2>Your Orders</h2>
            <div id="order-list">
                <!-- Order history will be displayed here -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Grocery Store. All Rights Reserved.</p>
    </footer>
    <script>
        const products = [
            { id: 1, name: 'Apple', price: 1.00 },
            { id: 2, name: 'Banana', price: 0.50 },
            { id: 3, name: 'Carrot', price: 0.30 }
        ];

        const cart = [];

        function displayProducts() {
            const productList = $('#product-list');
            products.forEach(product => {
                productList.append(`<div>${product.name} - $${product.price}<button onclick='addToCart(${product.id})'>Add to Cart</button></div>`);
            });
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            cart.push(product);
            alert(`${product.name} has been added to your cart.`);
            updateCart();
        }

        function updateCart() {
            const cartItems = $('#cart-items');
            cartItems.empty();
            cart.forEach(item => {
                cartItems.append(`<div>${item.name} - $${item.price}</div>`);
            });
        }

        function checkout() {
            const razorpayOptions = {
                key: 'YOUR_RAZORPAY_KEY', // Enter your Razorpay key here
                amount: calculateTotal() * 100,
                currency: 'INR',
                name: 'Grocery Store',
                handler: function (response) {
                    alert('Payment successful: ' + response.razorpay_payment_id);
                },
                prefill: {
                    name: 'Customer Name',
                    email: 'customer@example.com',
                    contact: '9999999999'
                }
            };
            const razorpay = new Razorpay(razorpayOptions);
            razorpay.open();
        }

        function calculateTotal() {
            return cart.reduce((sum, item) => sum + item.price, 0);
        }

        $(document).ready(function() {
            displayProducts();
            $('#checkout').click(function() {
                checkout();
            });
        });
    </script>
</body>
</html>
