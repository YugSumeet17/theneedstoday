<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Admin Panel</h1>
        <nav>
            <ul>
                <li><a href="#manage-products">Manage Products</a></li>
                <li><a href="#manage-orders">Manage Orders</a></li>
                <li><a href="#manage-inventory">Manage Inventory</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="manage-products">
            <h2>Manage Products</h2>
            <button>Add Product</button>
            <table>
                <tr>
                    <th>Product ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
                <!-- Products will be populated here -->
            </table>
        </section>
        <section id="manage-orders">
            <h2>Manage Orders</h2>
            <table>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                <!-- Orders will be populated here -->
            </table>
        </section>
        <section id="manage-inventory">
            <h2>Manage Inventory</h2>
            <button>Update Inventory</button>
            <table>
                <tr>
                    <th>Product ID</th>
                    <th>Stock Level</th>
                    <th>Actions</th>
                </tr>
                <!-- Inventory details will be populated here -->
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Your Company</p>
    </footer>
</body>
</html>
